name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up SSH
      uses: webfactory/ssh-action@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add host key
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

    - name: Deploy to VPS
      run: |
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "mkdir -p /home/${{ secrets.VPS_USER }}/nextjs-plc-many"
        rsync -a --exclude={'.git','.next','node_modules'} ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/${{ secrets.VPS_USER }}/nextjs-plc-many/
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "cd /home/${{ secrets.VPS_USER }}/nextjs-plc-many && docker compose build && docker compose up -d"
